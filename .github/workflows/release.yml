name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to build and publish"
        required: true
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref_name }}
      - name: Add Rust target
        run: rustup target add "${{ matrix.target }}"
      - name: Build
        run: cargo build --release --locked --target "${{ matrix.target }}"
      - name: Package
        run: |
          archive="orqa-${{ matrix.target }}.tar.gz"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/orqa" dist/orqa
          tar -C dist -czf "$archive" orqa
          shasum -a 256 "$archive" > "$archive.sha256"
      - uses: actions/upload-artifact@v7
        with:
          name: orqa-${{ matrix.target }}
          path: |
            orqa-${{ matrix.target }}.tar.gz
            orqa-${{ matrix.target }}.tar.gz.sha256

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          gh release create "$RELEASE_TAG" \
            ./*.tar.gz \
            ./*.tar.gz.sha256 \
            --repo "$GITHUB_REPOSITORY" \
            --title "orqa $RELEASE_TAG" \
            --generate-notes \
            --verify-tag

  homebrew:
    name: Publish Homebrew formula
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Update tap formula
        env:
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "::error::Missing HOMEBREW_TAP_TOKEN secret"
            exit 1
          fi

          version="${RELEASE_TAG#v}"
          base_url="https://github.com/ianzepp/orqa/releases/download/${RELEASE_TAG}"

          checksum() {
            curl -fsSL "${base_url}/$1.sha256" | awk '{print $1}'
          }

          arm_sha="$(checksum orqa-aarch64-apple-darwin.tar.gz)"
          intel_sha="$(checksum orqa-x86_64-apple-darwin.tar.gz)"
          linux_sha="$(checksum orqa-x86_64-unknown-linux-gnu.tar.gz)"

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/ianzepp/homebrew-tap.git" tap
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          cat > Formula/orqa.rb <<EOF
          class Orqa < Formula
            desc "Local coordinator for background agents organized as pods and fins"
            homepage "https://github.com/ianzepp/orqa"
            license "MIT"

            on_macos do
              on_arm do
                url "${base_url}/orqa-aarch64-apple-darwin.tar.gz"
                sha256 "${arm_sha}"
              end

              on_intel do
                url "${base_url}/orqa-x86_64-apple-darwin.tar.gz"
                sha256 "${intel_sha}"
              end
            end

            on_linux do
              on_intel do
                url "${base_url}/orqa-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${linux_sha}"
              end
            end

            def install
              bin.install "orqa"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/orqa --version")
              assert_match "pod", shell_output("#{bin}/orqa --help")
            end
          end
          EOF

          if git diff --quiet -- Formula/orqa.rb; then
            echo "Formula/orqa.rb is already at ${version}"
            exit 0
          fi

          git add Formula/orqa.rb
          git commit -m "orqa ${version}"
          git push origin HEAD:main
